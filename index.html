<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOKIN Smart Room</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#e5673e" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#fdf6f4', 
                100: '#fbece8', 
                200: '#f6d5cc',
                300: '#efb3a2',
                400: '#e5673e', 
                500: '#e5673e', // Primary Brand Color
                600: '#d14d25', // Hover state
                700: '#b54e2e',
                800: '#8c301a',
                900: '#722a19',
              }
            },
            fontFamily: {
              sans: ['Poppins', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Poppins', sans-serif;
      }
      /* Custom scrollbar for cleaner UI */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
      @keyframes itRgbNeonShift {
        0% {
          background-position: 0% 50%;
          box-shadow: 0 0 12px rgba(6, 182, 212, 0.55), 0 0 26px rgba(59, 130, 246, 0.38);
        }
        50% {
          box-shadow: 0 0 14px rgba(168, 85, 247, 0.5), 0 0 30px rgba(236, 72, 153, 0.34);
        }
        100% {
          background-position: 100% 50%;
          box-shadow: 0 0 12px rgba(34, 197, 94, 0.46), 0 0 26px rgba(34, 211, 238, 0.34);
        }
      }
      @keyframes itRgbNeonSweep {
        0% {
          transform: translateX(-130%) skewX(-18deg);
          opacity: 0;
        }
        24% {
          opacity: 0.7;
        }
        52% {
          transform: translateX(130%) skewX(-18deg);
          opacity: 0;
        }
        100% {
          transform: translateX(130%) skewX(-18deg);
          opacity: 0;
        }
      }
      .booking-it-neon {
        position: relative;
        isolation: isolate;
        overflow: hidden;
        border-color: rgba(34, 211, 238, 0.95) !important;
        background:
          linear-gradient(135deg, rgba(236, 254, 255, 0.98), rgba(240, 249, 255, 0.96), rgba(250, 245, 255, 0.94)) padding-box,
          linear-gradient(90deg, #00f5ff, #2563eb, #8b5cf6, #ff2bd6, #22ff88, #00f5ff) border-box !important;
        background-size: 100% 100%, 340% 340% !important;
        color: #082f49 !important;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.9);
        animation: itRgbNeonShift 3.5s ease-in-out infinite alternate;
      }
      .booking-it-neon::after {
        content: "";
        position: absolute;
        inset: -45%;
        z-index: 0;
        pointer-events: none;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.7), rgba(0, 245, 255, 0.28), transparent);
        animation: itRgbNeonSweep 2.8s ease-in-out infinite;
      }
      .booking-it-neon * {
        color: inherit;
      }
      .booking-it-neon > * {
        position: relative;
        z-index: 1;
      }
      .timeline-grid-scroll {
        overscroll-behavior-x: contain;
        scroll-behavior: auto;
        scrollbar-gutter: stable;
        -webkit-overflow-scrolling: touch;
        container-type: inline-size;
        contain: layout paint;
      }
      .timeline-grid-table {
        table-layout: fixed;
      }
      .timeline-grid-slot {
        width: clamp(96px, calc((100cqw - 8rem) / var(--timeline-hours, 12)), 142px);
        min-width: clamp(96px, calc((100cqw - 8rem) / var(--timeline-hours, 12)), 142px);
      }
      @supports not (width: 1cqw) {
        .timeline-grid-slot {
          width: clamp(96px, calc((100vw - 13.75rem) / var(--timeline-hours, 12)), 142px);
          min-width: clamp(96px, calc((100vw - 13.75rem) / var(--timeline-hours, 12)), 142px);
        }
      }
      @media (max-width: 640px) {
        .timeline-grid-slot {
          width: 112px;
          min-width: 112px;
        }
      }
      .timeline-grid-sticky {
        transform: translateZ(0);
        backface-visibility: hidden;
        contain: paint;
      }
      .timeline-grid-cell {
        contain: layout paint;
      }
      .timeline-grid-line {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        overflow: hidden;
        word-break: break-word;
      }
      .timeline-grid-purpose {
        display: block;
        max-width: 100%;
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
      }
      .timeline-grid-purpose-track {
        display: block;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      @media (prefers-reduced-motion: reduce) {
        .booking-it-neon,
        .booking-it-neon::after {
          display: block;
          max-width: 100%;
          min-width: 0;
          overflow: hidden;
          text-overflow: ellipsis;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
