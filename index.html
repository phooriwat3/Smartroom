<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOKIN Smart Room</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="theme-color" content="#e5673e" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#fdf6f4', 
                100: '#fbece8', 
                200: '#f6d5cc',
                300: '#efb3a2',
                400: '#e5673e', 
                500: '#e5673e', // Primary Brand Color
                600: '#d14d25', // Hover state
                700: '#b54e2e',
                800: '#8c301a',
                900: '#722a19',
              }
            },
            fontFamily: {
              sans: ['FC Pride', 'Arial', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      @font-face {
        font-family: 'FC Pride';
        src: url('/fonts/fc-pride-non-commercial.otf') format('opentype');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }
      body {
        font-family: 'FC Pride', Arial, sans-serif;
      }
      /* Custom scrollbar for cleaner UI */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
      @keyframes itRgbGlow {
        0%   { box-shadow: 0 0 8px 2px #00f5ff, 0 0 22px 5px #00f5ff88, 0 0 50px 10px #00f5ff33; outline-color: #00f5ff; }
        14%  { box-shadow: 0 0 8px 2px #0055ff, 0 0 22px 5px #0055ff88, 0 0 50px 10px #0055ff33; outline-color: #0055ff; }
        28%  { box-shadow: 0 0 8px 2px #aa00ff, 0 0 22px 5px #aa00ff88, 0 0 50px 10px #aa00ff33; outline-color: #aa00ff; }
        42%  { box-shadow: 0 0 8px 2px #ff00cc, 0 0 22px 5px #ff00cc88, 0 0 50px 10px #ff00cc33; outline-color: #ff00cc; }
        57%  { box-shadow: 0 0 8px 2px #ff3300, 0 0 22px 5px #ff330088, 0 0 50px 10px #ff330033; outline-color: #ff3300; }
        71%  { box-shadow: 0 0 8px 2px #ffcc00, 0 0 22px 5px #ffcc0088, 0 0 50px 10px #ffcc0033; outline-color: #ffcc00; }
        85%  { box-shadow: 0 0 8px 2px #00ff44, 0 0 22px 5px #00ff4488, 0 0 50px 10px #00ff4433; outline-color: #00ff44; }
        100% { box-shadow: 0 0 8px 2px #00f5ff, 0 0 22px 5px #00f5ff88, 0 0 50px 10px #00f5ff33; outline-color: #00f5ff; }
      }

      @keyframes itRgbBorder {
        0%   { border-color: #00f5ff; }
        14%  { border-color: #0055ff; }
        28%  { border-color: #aa00ff; }
        42%  { border-color: #ff00cc; }
        57%  { border-color: #ff3300; }
        71%  { border-color: #ffcc00; }
        85%  { border-color: #00ff44; }
        100% { border-color: #00f5ff; }
      }
      .booking-it-neon {
        position: relative;
        isolation: isolate;
        overflow: visible !important;
        background: linear-gradient(135deg, #000d1a 0%, #050010 50%, #0a0018 100%) !important;
        border: 2px solid #00f5ff !important;
        outline: 1.5px solid #00f5ff;
        outline-offset: 1px;
        color: #e0ffff !important;
        text-shadow: 0 0 6px #00f5ff, 0 0 12px rgba(0,200,255,0.8);
        animation:
          itRgbGlow   1.6s linear infinite,
          itRgbBorder 1.6s linear infinite;
      }
      .booking-it-neon::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
          0deg,
          transparent 0px,
          transparent 3px,
          rgba(0,245,255,0.05) 3px,
          rgba(0,245,255,0.05) 4px
        );
      }
      .booking-it-neon * {
        color: inherit !important;
        text-shadow: inherit !important;
      }
      .booking-it-neon > * {
        position: relative;
        z-index: 1;
      }
      @media (prefers-reduced-motion: reduce) {
        .booking-it-neon,
        .booking-it-neon::after,
        .booking-it-neon::before {
          animation: none !important;
          box-shadow: 0 0 12px rgba(0,245,255,0.7) !important;
          border-color: #00f5ff !important;
          outline-color: #00f5ff !important;
        }
      }
      .timeline-grid-scroll {
        overscroll-behavior-x: contain;
        scroll-behavior: auto;
        scrollbar-gutter: stable;
        -webkit-overflow-scrolling: touch;
        container-type: inline-size;
        contain: layout paint;
      }
      .timeline-grid-table {
        table-layout: fixed;
      }
      .timeline-grid-slot {
        width: clamp(96px, calc((100cqw - 8rem) / var(--timeline-hours, 12)), 142px);
        min-width: clamp(96px, calc((100cqw - 8rem) / var(--timeline-hours, 12)), 142px);
      }
      @supports not (width: 1cqw) {
        .timeline-grid-slot {
          width: clamp(96px, calc((100vw - 13.75rem) / var(--timeline-hours, 12)), 142px);
          min-width: clamp(96px, calc((100vw - 13.75rem) / var(--timeline-hours, 12)), 142px);
        }
      }
      @media (max-width: 640px) {
        .timeline-grid-slot {
          width: 112px;
          min-width: 112px;
        }
      }
      .timeline-grid-sticky {
        transform: translateZ(0);
        backface-visibility: hidden;
        contain: paint;
      }
      .timeline-grid-cell {
        contain: layout paint;
      }
      .timeline-grid-line {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        overflow: hidden;
        word-break: break-word;
      }
      .timeline-grid-purpose {
        display: block;
        max-width: 100%;
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
      }
      .timeline-grid-purpose-track {
        display: block;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      @media (prefers-reduced-motion: reduce) {
        .booking-it-neon,
        .booking-it-neon::after {
          display: block;
          max-width: 100%;
          min-width: 0;
          overflow: hidden;
          text-overflow: ellipsis;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
