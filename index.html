<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOKIN Smart Room</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="theme-color" content="#e5673e" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#fdf6f4', 
                100: '#fbece8', 
                200: '#f6d5cc',
                300: '#efb3a2',
                400: '#e5673e', 
                500: '#e5673e', // Primary Brand Color
                600: '#d14d25', // Hover state
                700: '#b54e2e',
                800: '#8c301a',
                900: '#722a19',
              }
            },
            fontFamily: {
              sans: ['Poppins', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Poppins', sans-serif;
      }
      /* Custom scrollbar for cleaner UI */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
      @keyframes itRgbNeonShift {
        0%   { background-position: 0% 50%;   box-shadow: 0 0 10px 2px rgba(0,245,255,0.9), 0 0 30px 6px rgba(0,245,255,0.55), 0 0 60px 12px rgba(0,200,255,0.3); border-color: #00f5ff !important; }
        16%  { background-position: 20% 50%;  box-shadow: 0 0 10px 2px rgba(0,128,255,0.9), 0 0 30px 6px rgba(0,100,255,0.55), 0 0 60px 12px rgba(0,80,255,0.3);  border-color: #0066ff !important; }
        33%  { background-position: 40% 50%;  box-shadow: 0 0 10px 2px rgba(160,32,240,0.9), 0 0 30px 6px rgba(140,0,255,0.55), 0 0 60px 12px rgba(120,0,255,0.3); border-color: #a020f0 !important; }
        50%  { background-position: 60% 50%;  box-shadow: 0 0 10px 2px rgba(255,0,200,0.9), 0 0 30px 6px rgba(255,0,180,0.55), 0 0 60px 12px rgba(255,0,150,0.3);  border-color: #ff00cc !important; }
        66%  { background-position: 80% 50%;  box-shadow: 0 0 10px 2px rgba(255,60,0,0.9),  0 0 30px 6px rgba(255,80,0,0.55),  0 0 60px 12px rgba(255,100,0,0.3);  border-color: #ff3c00 !important; }
        83%  { background-position: 90% 50%;  box-shadow: 0 0 10px 2px rgba(0,255,80,0.9),  0 0 30px 6px rgba(0,255,100,0.55), 0 0 60px 12px rgba(0,255,120,0.3);  border-color: #00ff50 !important; }
        100% { background-position: 100% 50%; box-shadow: 0 0 10px 2px rgba(0,245,255,0.9), 0 0 30px 6px rgba(0,245,255,0.55), 0 0 60px 12px rgba(0,200,255,0.3); border-color: #00f5ff !important; }
      }
      @keyframes itRgbNeonSweep {
        0%   { transform: translateX(-160%) skewX(-20deg); opacity: 0; }
        18%  { opacity: 0.85; }
        48%  { transform: translateX(160%) skewX(-20deg); opacity: 0; }
        100% { transform: translateX(160%) skewX(-20deg); opacity: 0; }
      }
      @keyframes itRgbPulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.88; }
      }
      .booking-it-neon {
        position: relative;
        isolation: isolate;
        overflow: hidden;
        border-width: 2px !important;
        background:
          linear-gradient(135deg, rgba(0,10,25,0.95), rgba(0,8,30,0.93), rgba(5,0,30,0.92)) padding-box,
          linear-gradient(90deg, #00f5ff, #0066ff, #a020f0, #ff00cc, #ff3c00, #00ff50, #00f5ff) border-box !important;
        background-size: 100% 100%, 400% 400% !important;
        color: #e0f8ff !important;
        text-shadow: 0 0 8px rgba(0,245,255,0.9), 0 0 16px rgba(0,200,255,0.7);
        animation: itRgbNeonShift 1.8s linear infinite, itRgbPulse 2.2s ease-in-out infinite;
      }
      .booking-it-neon::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(0,245,255,0.04) 3px,
          rgba(0,245,255,0.04) 4px
        );
      }
      .booking-it-neon::after {
        content: "";
        position: absolute;
        inset: -60%;
        z-index: 0;
        pointer-events: none;
        background: linear-gradient(90deg, transparent, rgba(0,245,255,0.35), rgba(255,255,255,0.5), rgba(0,245,255,0.35), transparent);
        animation: itRgbNeonSweep 2.0s ease-in-out infinite;
      }
      .booking-it-neon * {
        color: inherit;
        text-shadow: inherit;
      }
      .booking-it-neon > * {
        position: relative;
        z-index: 1;
      }
      @media (prefers-reduced-motion: reduce) {
        .booking-it-neon,
        .booking-it-neon::after,
        .booking-it-neon::before {
          animation: none !important;
          box-shadow: 0 0 10px rgba(0,245,255,0.6) !important;
        }
      }
      .timeline-grid-scroll {
        overscroll-behavior-x: contain;
        scroll-behavior: auto;
        scrollbar-gutter: stable;
        -webkit-overflow-scrolling: touch;
        container-type: inline-size;
        contain: layout paint;
      }
      .timeline-grid-table {
        table-layout: fixed;
      }
      .timeline-grid-slot {
        width: clamp(96px, calc((100cqw - 8rem) / var(--timeline-hours, 12)), 142px);
        min-width: clamp(96px, calc((100cqw - 8rem) / var(--timeline-hours, 12)), 142px);
      }
      @supports not (width: 1cqw) {
        .timeline-grid-slot {
          width: clamp(96px, calc((100vw - 13.75rem) / var(--timeline-hours, 12)), 142px);
          min-width: clamp(96px, calc((100vw - 13.75rem) / var(--timeline-hours, 12)), 142px);
        }
      }
      @media (max-width: 640px) {
        .timeline-grid-slot {
          width: 112px;
          min-width: 112px;
        }
      }
      .timeline-grid-sticky {
        transform: translateZ(0);
        backface-visibility: hidden;
        contain: paint;
      }
      .timeline-grid-cell {
        contain: layout paint;
      }
      .timeline-grid-line {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        overflow: hidden;
        word-break: break-word;
      }
      .timeline-grid-purpose {
        display: block;
        max-width: 100%;
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
      }
      .timeline-grid-purpose-track {
        display: block;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      @media (prefers-reduced-motion: reduce) {
        .booking-it-neon,
        .booking-it-neon::after {
          display: block;
          max-width: 100%;
          min-width: 0;
          overflow: hidden;
          text-overflow: ellipsis;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",

  }
}
</script>

</head>

</body>
</html>
